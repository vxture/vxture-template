# __PRODUCT_CODE__.vxture.com - app (prod). Source artifact owned by this repo.
#
# INSTALLED on the shared vxture public edge (edge host), NOT run by this stack.
# The edge terminates TLS with the *.vxture.com wildcard cert and reverse-proxies
# over tailscale to <code>-app on the deploy host (private compute, no public IP).
# Install: copy this file into the vxture project repository and run the edge
# nginx-sync script on the edge host. See configs/edge/README.md.
#
# Set the upstream port to this product's assigned APP_PUBLISH_PORT (infra
# allocation). Each product on the shared deploy host uses a distinct port.

server {
    listen 80;
    listen [::]:80;
    server_name __PRODUCT_CODE__.vxture.com;
    return 301 https://__PRODUCT_CODE__.vxture.com$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name __PRODUCT_CODE__.vxture.com;

    # Shared *.vxture.com wildcard cert (same as console/accounts).
    ssl_certificate     /etc/nginx/ssl/live/vxture.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/vxture.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options           SAMEORIGIN always;
    add_header X-Content-Type-Options    nosniff always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    client_max_body_size 25m;

    # Upstream = deploy host over tailscale. The shared-edge nginx resolves only
    # Docker DNS, so if MagicDNS (resolver 100.100.100.100) is not reachable from
    # the edge container, change this one line to the IP form
    # "100.76.219.48:<APP_PUBLISH_PORT>".
    resolver 100.100.100.100 valid=30s ipv6=off;   # tailscale MagicDNS
    set $upstream "vx-worker-02:__APP_PUBLISH_PORT__";   # set to this product's APP_PUBLISH_PORT

    # Internal-only endpoints must NOT be reachable from the public edge. The
    # usage-flush trigger is driven internally on the tailnet; return 404 here.
    # (The app's INTERNAL_JOB_TOKEN guard is the second layer.)
    location = /api/usage/flush { return 404; }

    location / {
        proxy_pass         http://$upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        '';
    }
}
