# Three-container stack for the app profile: <code>-app (Next.js) + <code>-redis
# (RP session store) + <code>-db (business data). PROJECT_NAME drives the
# compose project + container-name prefix so prod and beta never collide on one
# host (prod=<code>-*, beta=<code>-beta-*). Backing services are internal-only;
# only the app publishes a port. Structure/deploy details are exercised in the
# deployment batch (batch E).
name: ${PROJECT_NAME:-__PRODUCT_CODE__}

services:
  app:
    container_name: ${PROJECT_NAME:-__PRODUCT_CODE__}-app
    build:
      context: .
      dockerfile: portals/app/Dockerfile
      # Local `compose build` only; the deploy path pulls the CI-built image (which
      # injects real provenance). Honest dev/unknown defaults for local builds.
      args:
        APP_VERSION: ${APP_VERSION:-dev}
        GIT_SHA: ${GIT_SHA:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
        DEPLOY_STAGE: ${DEPLOY_STAGE:-dev}
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-vxture}/${PRODUCT_CODE:-__PRODUCT_CODE__}-app:${IMAGE_TAG:-local}
    # Load the full operator .env into the app so ALL runtime config (OIDC,
    # platform client, webhook, INTERNAL_JOB_TOKEN, STATUS_PAGE, ...) reaches it -
    # not just the few keys in `environment:` below. APP_ENV_FILE is the absolute
    # path deploy.sh passes (<root>/etc/.env); local dev falls back to ./.env.
    env_file:
      - path: ${APP_ENV_FILE:-.env}
        required: false
    environment:
      NODE_ENV: production
      PORT: "3000"
      REDIS_URL: redis://${PROJECT_NAME:-__PRODUCT_CODE__}-redis:6379
      DATABASE_URL: ${DATABASE_URL:-}
    ports:
      - "${APP_PUBLISH_PORT:-3000}:3000"
    depends_on:
      - redis
      - db
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks: [appnet]
    restart: unless-stopped

  redis:
    container_name: ${PROJECT_NAME:-__PRODUCT_CODE__}-redis
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ${DATA_DIR:-./data}/redis:/data
    networks: [appnet]
    restart: unless-stopped

  db:
    container_name: ${PROJECT_NAME:-__PRODUCT_CODE__}-db
    image: postgres:16-alpine
    environment:
      # The container superuser is the DB OWNER, NOT the service role. The DDL
      # (db-init, as this owner) creates the least-privilege <code>_svc role that
      # the app connects as via DATABASE_URL (product_240 section 2.7: connect
      # identity = <code>_svc, never owner-direct).
      POSTGRES_DB: ${POSTGRES_DB:-vxturebiz_${PRODUCT_CODE_SNAKE:-__PRODUCT_CODE_SNAKE__}_prod}
      POSTGRES_USER: ${POSTGRES_DB_OWNER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
    volumes:
      - ${DATA_DIR:-./data}/db:/var/lib/postgresql/data
    networks: [appnet]
    restart: unless-stopped

networks:
  appnet:
    name: ${PROJECT_NAME:-__PRODUCT_CODE__}-net
