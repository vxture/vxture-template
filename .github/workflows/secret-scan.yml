name: secret-scan

# Secret hygiene CI gate - one of the four org-mandated detection layers
# (GitHub push protection -> local pre-commit hook -> this CI gate -> public
# posture with no private fallback, so "credentials never committed" is
# absolute). Runs a full-history gitleaks scan; any finding fails the job and
# blocks the merge (the `gitleaks` check is required on main).
#
# Runs the pinned gitleaks binary directly - the official gitleaks-action
# requires a license for org repositories, the binary does not. The download is
# sha256-verified. Rules and the allowlist of known-safe placeholders live in
# the repo-root .gitleaks.toml.
# Org standard: vxture 140-repo-governance-standard.md #2.

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: secret-scan-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.ref }}
  cancel-in-progress: true

env:
  # Single point of upgrade (see https://github.com/gitleaks/gitleaks/releases).
  # Bump both the version and the sha256 below together.
  GITLEAKS_VERSION: "8.21.2"

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          # `gitleaks detect` scans the full commit history, so the leak check
          # covers past commits as well as the working tree.
          fetch-depth: 0

      - name: Cache gitleaks binary
        id: gitleaks-cache
        uses: actions/cache@v4
        with:
          path: /tmp/gitleaks-bin
          key: gitleaks-${{ env.GITLEAKS_VERSION }}-linux-x64

      - name: Download gitleaks (cache miss only)
        if: ${{ steps.gitleaks-cache.outputs.cache-hit != 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          sha256=5bc41815076e6ed6ef8fbecc9d9b75bcae31f39029ceb55da08086315316e3ba
          url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          mkdir -p /tmp/gitleaks-bin
          curl -fsSL "$url" -o /tmp/gitleaks.tar.gz
          echo "${sha256}  /tmp/gitleaks.tar.gz" | sha256sum -c -
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp/gitleaks-bin gitleaks

      - name: Scan full git history (gitleaks detect)
        shell: bash
        run: |
          set -euo pipefail
          chmod +x /tmp/gitleaks-bin/gitleaks
          # --redact keeps any matched value out of the logs; a finding exits
          # non-zero and fails this required check.
          /tmp/gitleaks-bin/gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --redact \
            --no-banner \
            --exit-code 1 \
            --report-format sarif \
            --report-path gitleaks.sarif

      - name: Upload findings (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-sarif
          path: gitleaks.sarif
          if-no-files-found: ignore
