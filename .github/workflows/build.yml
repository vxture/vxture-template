name: build

# Reusable image build, called by deploy.yml after it routes the tag to an
# environment. Publishes both an immutable sha-<short> tag (what deploy pulls by,
# and the build-dedup key) and the exact pushed ref tag. Dual registry: GHCR
# (primary for the non-VPC deploy host) + Aliyun ACR (fallback).
on:
  workflow_call:
    inputs:
      pass_sha:
        description: Commit SHA to build and tag
        required: true
        type: string
    secrets:
      NODE_AUTH_TOKEN:
        required: true
      ALIYUN_ACR_USERNAME:
        required: true
      ALIYUN_ACR_PASSWORD:
        required: true
    outputs:
      image_tag:
        description: Immutable sha-<short> tag the deploy job should pull by
        value: ${{ jobs.docker-build.outputs.image_tag }}
  workflow_dispatch:
    inputs:
      pass_sha:
        description: Commit SHA to build (defaults to branch HEAD)
        required: false
        type: string
        default: ''

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  docker-build:
    name: docker-build
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    env:
      GHCR_NAMESPACE: vxture
      ACR_REGISTRY: ${{ vars.ALIYUN_ACR_REGISTRY }}
      ACR_NAMESPACE: ${{ vars.ALIYUN_ACR_NAMESPACE }}
      VXTURE_NPM_REGISTRY: ${{ vars.VXTURE_NPM_REGISTRY }}
      # Product code source: the PRODUCT_CODE repo variable (the template sets it
      # to the demo code `vxtpl`), falling back to the __PRODUCT_CODE__ literal an
      # instantiated product repo has already replaced with its real code.
      IMAGE: ${{ vars.PRODUCT_CODE || '__PRODUCT_CODE__' }}-app
      IMAGE_CONTEXT: .
      IMAGE_DOCKERFILE: ./portals/app/Dockerfile
    steps:
      - name: Resolve build SHA
        id: sha
        shell: bash
        env:
          CALLER_SHA: ${{ inputs.pass_sha }}
          DEFAULT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          resolved="${CALLER_SHA:-$DEFAULT_SHA}"
          test -n "$resolved"
          echo "sha=$resolved" >> "$GITHUB_OUTPUT"

      - name: Validate registry secrets
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
          ALIYUN_ACR_USERNAME: ${{ secrets.ALIYUN_ACR_USERNAME }}
          ALIYUN_ACR_PASSWORD: ${{ secrets.ALIYUN_ACR_PASSWORD }}
        run: |
          set -euo pipefail
          test -n "$ACR_REGISTRY"
          test -n "$ACR_NAMESPACE"
          test -n "$ALIYUN_ACR_USERNAME"
          test -n "$ALIYUN_ACR_PASSWORD"
          test -n "$NODE_AUTH_TOKEN"

      - name: Checkout passed revision
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.sha.outputs.sha }}

      # Build-time instantiation: bake the real product code into the image
      # source (brand, package scope, DDL, OIDC client, ...) so the deployed app
      # identifies as PRODUCT_CODE, not the __PRODUCT_CODE__ placeholder. Runs on
      # the ephemeral CI checkout only; the repo stays a template. A no-op for an
      # already-instantiated product repo (no placeholders left to replace).
      - name: Instantiate for PRODUCT_CODE
        if: ${{ vars.PRODUCT_CODE != '' }}
        shell: bash
        env:
          PRODUCT_CODE: ${{ vars.PRODUCT_CODE }}
        run: node scripts/init/instantiate.mjs "$PRODUCT_CODE"

      - name: Compute image metadata
        id: meta
        shell: bash
        env:
          PASSED_SHA: ${{ steps.sha.outputs.sha }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          short_sha="${PASSED_SHA::7}"
          echo "image_tag=sha-$short_sha" >> "$GITHUB_OUTPUT"
          echo "ref_tag=$REF_NAME" >> "$GITHUB_OUTPUT"

      # Health provenance (025 section 4.2): derive the four build-injected values
      # from git tag / sha / date, with honest fallbacks. gitSha is BARE (no
      # `sha-` prefix - that prefix is the image-tag form, not the data).
      - name: Compute health provenance
        id: prov
        shell: bash
        env:
          PASSED_SHA: ${{ steps.sha.outputs.sha }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          set -euo pipefail
          if [ "$REF_TYPE" = "tag" ]; then app_version="$REF_NAME"; else app_version="dev"; fi
          case "$REF_TYPE:$REF_NAME" in
            tag:v*)    stage="production" ;;
            tag:beta-*) stage="beta" ;;
            tag:dev-*) stage="dev" ;;
            *)         stage="dev" ;;
          esac
          {
            echo "app_version=$app_version"
            echo "git_sha=${PASSED_SHA::8}"
            echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "deploy_stage=$stage"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3
        continue-on-error: true

      - name: Set up Docker Buildx (retry)
        if: ${{ steps.buildx.outcome == 'failure' }}
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Aliyun ACR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ALIYUN_ACR_USERNAME }}
          password: ${{ secrets.ALIYUN_ACR_PASSWORD }}

      - name: Decide build vs retag
        id: decide
        shell: bash
        env:
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
        run: |
          set -euo pipefail
          ghcr_repo="ghcr.io/${GHCR_NAMESPACE}/${IMAGE}"
          acr_repo="${ACR_REGISTRY}/${ACR_NAMESPACE}/${IMAGE}"
          # Retag by digest if this exact commit was already built under a prior
          # tag (check BOTH registries). Otherwise build.
          if docker buildx imagetools inspect "${ghcr_repo}:${IMAGE_TAG}" >/dev/null 2>&1 \
            && docker buildx imagetools inspect "${acr_repo}:${IMAGE_TAG}" >/dev/null 2>&1; then
            echo "build=false" >> "$GITHUB_OUTPUT"
          else
            echo "build=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push image
        if: ${{ steps.decide.outputs.build == 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.IMAGE_CONTEXT }}
          file: ${{ env.IMAGE_DOCKERFILE }}
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # @vxture/* needs a PAT (GITHUB_TOKEN lacks read_package for the
          # separate packages repo). The PAT rides a BuildKit secret (mounted at
          # /run/secrets in the Dockerfile deps stage), NOT a build-arg (a
          # build-arg would persist into the exported mode=max gha cache).
          build-args: |
            VXTURE_NPM_REGISTRY=${{ env.VXTURE_NPM_REGISTRY }}
            APP_VERSION=${{ steps.prov.outputs.app_version }}
            GIT_SHA=${{ steps.prov.outputs.git_sha }}
            BUILD_TIME=${{ steps.prov.outputs.build_time }}
            DEPLOY_STAGE=${{ steps.prov.outputs.deploy_stage }}
          secrets: |
            node_auth_token=${{ secrets.NODE_AUTH_TOKEN }}
          tags: |
            ghcr.io/${{ env.GHCR_NAMESPACE }}/${{ env.IMAGE }}:${{ steps.meta.outputs.image_tag }}
            ghcr.io/${{ env.GHCR_NAMESPACE }}/${{ env.IMAGE }}:${{ steps.meta.outputs.ref_tag }}
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.IMAGE }}:${{ steps.meta.outputs.image_tag }}
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.IMAGE }}:${{ steps.meta.outputs.ref_tag }}

      - name: Scan image (trivy, report-only)
        if: ${{ steps.decide.outputs.build == 'true' }}
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ghcr.io/${{ env.GHCR_NAMESPACE }}/${{ env.IMAGE }}:${{ steps.meta.outputs.image_tag }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: Upload trivy results
        if: ${{ steps.decide.outputs.build == 'true' }}
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: trivy-results.sarif

      - name: Retag unchanged image by digest
        if: ${{ steps.decide.outputs.build == 'false' }}
        shell: bash
        env:
          IMAGE: ${{ env.IMAGE }}
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
          REF_TAG: ${{ steps.meta.outputs.ref_tag }}
        run: |
          set -euo pipefail
          for repo in \
            "ghcr.io/${GHCR_NAMESPACE}/${IMAGE}" \
            "${ACR_REGISTRY}/${ACR_NAMESPACE}/${IMAGE}"; do
            docker buildx imagetools create \
              -t "${repo}:${IMAGE_TAG}" \
              -t "${repo}:${REF_TAG}" \
              "${repo}:${IMAGE_TAG}"
          done
